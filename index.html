<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MataBantu - Asisten Tuan Ragil</title>
    <style>
        /* Desain High Contrast & Ukuran Besar untuk Lansia */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(255,255,255,0.1);
        }
        h1, h2 { color: #facc15; }
        
        /* Tombol SOS Khusus */
        .btn-sos {
            background-color: #ef4444; /* Merah terang */
            color: white;
            font-size: 28px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            animation: pulse 2s infinite;
        }
        .btn-sos:hover, .btn-sos:active { background-color: #dc2626; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        textarea {
            width: 90%;
            height: 100px;
            font-size: 24px;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 2px solid #facc15;
            background-color: #333;
            color: #fff;
        }
        button {
            width: 95%;
            font-size: 24px;
            padding: 15px;
            margin: 10px 0;
            background-color: #facc15;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { background-color: #eab308; transform: scale(0.98); }
        
        /* Kamera & Zoom */
        .camera-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #444;
            overflow: hidden; /* Biar kalau di-zoom gak tumpah ke luar kotak */
            position: relative;
        }
        video {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            border: 3px solid #facc15;
            display: none;
            margin: auto;
            transform-origin: center center; /* Biar zoom dari tengah */
            transition: transform 0.2s ease;
        }
        .zoom-controls {
            display: none;
            margin-top: 15px;
        }
        input[type=range] {
            width: 80%;
            height: 10px;
            background: #444;
            border-radius: 5px;
            outline: none;
        }
        
        #status {
            font-size: 20px;
            color: #6ee7b7;
            margin-top: 10px;
            font-weight: bold;
        }
        .section-divider { margin: 40px 0; border-bottom: 2px dashed #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>MataBantu</h1>
    <p style="font-size: 18px;">Asisten Pintar Lansia</p>

    <button class="btn-sos" onclick="sendSOS()">🚨 TOMBOL DARURAT 🚨</button>
    <div id="statusSOS" style="color: #ef4444; margin-top: 10px; font-weight: bold;"></div>

    <div class="section-divider"></div>

    <h2>1. Teks ke Suara</h2>
    <textarea id="textInput" placeholder="Ketik teks di sini..."></textarea>
    <button onclick="speakText()">🔊 Bacakan Teks</button>

    <div class="section-divider"></div>

    <div class="camera-box">
        <h2>2. Kaca Pembesar (Kamera)</h2>
        <button id="startCameraBtn" onclick="startMagnifier()">📷 Buka Kaca Pembesar</button>
        
        <video id="videoElement" autoplay playsinline></video>
        
        <div class="zoom-controls" id="zoomControls">
            <p style="font-size: 20px; margin-bottom: 5px;">Atur Pembesaran (Zoom):</p>
            <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1" oninput="applyZoom()">
        </div>
    </div>
</div>

<script>
    // --- FITUR 1: TOMBOL SOS (GEOLOCATION + WHATSAPP) ---
    function sendSOS() {
        const statusSOS = document.getElementById('statusSOS');
        statusSOS.innerText = "Mencari lokasi...";
        
        // GANTI DENGAN NOMOR KELUARGA/WALI (Gunakan format 62 tanpa angka 0 di depan)
        const nomorWA = "6281234567890"; 

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    const pesan = `TOLONG DARURAT! Saya butuh bantuan sekarang. Ini lokasi saya: ${mapsLink}`;
                    const waLink = `https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`;
                    
                    statusSOS.innerText = "Membuka WhatsApp...";
                    window.open(waLink, '_blank');
                    statusSOS.innerText = ""; // Bersihin pesan setelah kebuka
                },
                (error) => {
                    statusSOS.innerText = "Gagal dapat lokasi. Pastikan GPS nyala.";
                    alert("Tolong nyalakan GPS/Lokasi di HP Anda.");
                }
            );
        } else {
            alert("Browser Anda tidak mendukung fitur lokasi.");
        }
    }

    // --- FITUR 2: TEXT TO SPEECH ---
    function speakText(customText = null) {
        const text = customText || document.getElementById('textInput').value;
        if (!text) return;

        window.speechSynthesis.cancel(); 
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'id-ID'; 
        speech.rate = 0.9; 
        window.speechSynthesis.speak(speech);
    }

    // --- FITUR 3: KACA PEMBESAR (KAMERA + ZOOM CSS) ---
    const video = document.getElementById('videoElement');
    const startCamBtn = document.getElementById('startCameraBtn');
    const zoomControls = document.getElementById('zoomControls');
    const zoomSlider = document.getElementById('zoomSlider');

    async function startMagnifier() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            video.style.display = "block";
            zoomControls.style.display = "block";
            startCamBtn.style.display = "none";
            speakText("Kaca pembesar terbuka. Geser tombol di bawah kamera untuk memperbesar.");
        } catch (err) {
            alert("Gagal buka kamera.");
            speakText("Gagal membuka kamera.");
        }
    }

    function applyZoom() {
        const zoomValue = zoomSlider.value;
        // Pake CSS Transform buat nge-zoom video stream-nya
        video.style.transform = `scale(${zoomValue})`;
    }
</script>

</body>
</html>
